image:
  repository: ghcr.io/getnora-io/nora
  tag: latest

ingress:
  enabled: true
  className: nginx
  hosts:
    - host: nora.apatsev.org.ru
      paths:
        - path: /
          pathType: Prefix
  annotations:
    nginx.ingress.kubernetes.io/proxy-body-size: "0"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "600"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "600"

persistence:
  enabled: true
  size: 10Gi
  storageClass: ""
  accessMode: ReadWriteOnce

env:
  NORA_HOST: "0.0.0.0"
  NORA_PORT: "4000"
  NORA_PUBLIC_URL: "https://nora.apatsev.org.ru"
  NORA_AUTH_ENABLED: "false"
  RUST_LOG: "info"

resources:
  limits:
    memory: 512Mi
    cpu: "1"
  requests:
    memory: 128Mi
    cpu: "0.25"

service:
  type: ClusterIP
  port: 4000

healthcheck:
  enabled: true
  path: /health
  initialDelaySeconds: 10
  periodSeconds: 15
  timeoutSeconds: 5
  retries: 3
